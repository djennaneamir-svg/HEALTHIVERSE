<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Healthiverse</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
    .login-container { background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: var(--shadow); border: 1px solid var(--brd); }
    .login-head { text-align: center; margin-bottom: 32px; }
    .login-head h2 { font-size: 1.8rem; margin-bottom: 8px; font-family: 'Plus Jakarta Sans', sans-serif; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
    input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--brd); background: var(--bg); color: var(--txt); outline: none; }
    .btn-auth { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--teal); color: white; font-weight: 700; cursor: pointer; margin-top: 10px; transition: opacity 0.3s; }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--txt2); }
    .auth-footer a { color: var(--teal); font-weight: 700; text-decoration: none; }
    .msg-box { font-size: 0.85rem; margin-top: 12px; text-align: center; padding: 10px; border-radius: 10px; display: none; }
    .msg-box.error { display: block; background: #fee2e2; color: #991b1b; border-left: 3px solid #ef4444; }
    .msg-box.success { display: block; background: #d1fae5; color: #065f46; border-left: 3px solid #10b981; }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-head">
      <div class="logo-icon" style="margin: 0 auto 16px; width: 40px; height: 40px; background: var(--teal); border-radius: 12px; display: flex; align-items: center; justify-content: center;"><svg width="20" height="20" viewBox="0 0 28 28" fill="none"><path d="M14 3C14 3 6 8.5 6 15.5C6 19.64 9.36 23 14 23C18.64 23 22 19.64 22 15.5C22 8.5 14 3 14 3Z" fill="white" opacity="0.9"/><path d="M14 8V18M9 13H19" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg></div>
      <h2>Heureux de vous revoir</h2>
      <p>Connectez-vous pour gérer votre santé</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="votre@email.com" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="pass" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-auth" id="loginBtn">Se connecter</button>
      <div id="loginMsg" class="msg-box"></div>
    </form>

    <div class="auth-footer">
      <p>Pas encore de compte ? <a href="inscription.html">S'inscrire</a></p>
      <p style="margin-top: 10px;"><a href="#">Mot de passe oublié ?</a></p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="backend-config.js"></script>

  <script>
    // Init Firebase
    if (typeof firebase !== 'undefined' && !firebase.apps.length) {
      firebase.initializeApp(HEALTHIVERSE_CONFIG.firebase);
    }

    const msgBox = document.getElementById('loginMsg');

    function showMsg(text, type) {
      msgBox.textContent = text;
      msgBox.className = 'msg-box ' + type;
    }

    // If already logged in, redirect
    if (typeof firebase !== 'undefined') {
      firebase.auth().onAuthStateChanged(user => {
        if (user) {
          // Check user type from Firestore
          firebase.firestore().collection('patients').where('email', '==', user.email).get()
            .then(snap => {
              if (!snap.empty) {
                window.location.href = 'mon-compte.html';
              } else {
                window.location.href = 'dashboard.html';
              }
            });
        }
      });
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('pass').value;
      const btn = document.getElementById('loginBtn');

      btn.textContent = '⏳ Connexion...';
      btn.disabled = true;
      msgBox.className = 'msg-box';

      // Use Firebase Authentication
      if (typeof firebase !== 'undefined' && firebase.auth) {
        try {
          const cred = await firebase.auth().signInWithEmailAndPassword(email, pass);
          showMsg('✅ Connexion réussie ! Redirection...', 'success');

          // Determine user type from Firestore
          const db = firebase.firestore();
          const patientSnap = await db.collection('patients').where('email', '==', email).get();

          // Store session info
          localStorage.setItem('userAuth', 'true');
          localStorage.setItem('userEmail', email);
          localStorage.setItem('userName', cred.user.displayName || email);

          if (!patientSnap.empty) {
            localStorage.setItem('userType', 'patient');
            setTimeout(() => { window.location.href = 'mon-compte.html'; }, 800);
          } else {
            localStorage.setItem('userType', 'pro');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
          }
        } catch (err) {
          let msg = 'Identifiants invalides.';
          if (err.code === 'auth/user-not-found') msg = 'Aucun compte trouvé avec cet email.';
          else if (err.code === 'auth/wrong-password') msg = 'Mot de passe incorrect.';
          else if (err.code === 'auth/too-many-requests') msg = 'Trop de tentatives. Réessayez plus tard.';
          else if (err.code === 'auth/invalid-email') msg = 'Adresse email invalide.';
          showMsg(msg, 'error');
          btn.textContent = 'Se connecter';
          btn.disabled = false;
        }
      } else {
        // Firebase not configured yet — show helpful message
        showMsg('⚠️ Firebase Auth non configuré. Consultez backend-config.js pour activer la connexion.', 'error');
        btn.textContent = 'Se connecter';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
