<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accès Sécurisé - Administration Healthiverse</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { background: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #fff; }
    .login-card { background: #1e293b; padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
    .logo-m { font-size: 2rem; margin-bottom: 24px; }
    h2 { margin-bottom: 8px; font-family: 'Plus Jakarta Sans', sans-serif; }
    p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 32px; }
    input { width: 100%; padding: 16px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #fff; outline: none; }
    button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #0d9488; color: #fff; font-weight: 700; cursor: pointer; }
    .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 16px; display: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo-m">🛡️</div>
    <h2>Administration</h2>
    <p>Veuillez entrer votre mot de passe pour accéder au centre de commande.</p>
    
    <input type="password" id="adminPass" placeholder="Mot de passe">
    <button onclick="checkAdminAuth()">Se connecter</button>
    <div id="error" class="error-msg">Mot de passe incorrect.</div>
  </div>

  <script>
    function checkAdminAuth() {
      const pass = document.getElementById('adminPass').value;
      const error = document.getElementById('error');
      
      // Simulation d'un mot de passe (admin2026)
      if (pass === 'admin2026') {
        localStorage.setItem('adminAuth', 'true');
        window.location.href = 'admin.html';
      } else {
        error.style.display = 'block';
        setTimeout(() => error.style.display = 'none', 3000);
      }
    }
  </script>
</body>
</html>
